# Azure App Service deployment for Ariba/Coupa Agent
name: ariba-coupa-agent

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Build Docker image
      run: |
        docker build -t ariba-coupa-agent:${{ github.sha }} .
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ariba-coupa-agent'
        slot-name: 'production'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: 'ariba-coupa-agent:${{ github.sha }}'
